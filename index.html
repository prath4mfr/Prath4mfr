<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* 1. Page & Layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 2. Video Background */
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 1;
        }

        /* 3. Start Button with Pop Effect */
        #start-btn {
            cursor: pointer;
            z-index: 10;
            max-width: 150px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #start-btn:hover {
            transform: scale(1.15); /* The "Pop" effect */
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* 4. Minimalist Music Player (Bottom Right) */
        #player-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 5;
            color: white;
            opacity: 0; /* Starts hidden for Fade In */
            transition: opacity 1.5s ease;
            pointer-events: none; /* Disable interaction until fade-in */
        }

        .show-player {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        #album-art {
            width: 45px;
            height: 45px;
            border-radius: 50%; /* Circular for minimalist look */
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .song-info {
            display: flex;
            flex-direction: column;
        }

        .song-name {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        /* Controls Row */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            display: flex;
            align-items: center;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .control-btn:hover { opacity: 1; }

        /* Minimal Volume Slider */
        #volume-slider {
            width: 60px;
            height: 3px;
            cursor: pointer;
            accent-color: #fff;
            opacity: 0.6;
        }

        #volume-slider:hover { opacity: 1; }

    </style>
</head>
<body>

    <img src="start.png" id="start-btn" alt="Start">

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music">
        <source src="nangs.mp3" type="audio/mpeg">
    </audio>

    <div id="player-container">
        <img src="currentscover.jpeg" id="album-art" alt="Album Art">
        
        <div class="song-info">
            <span class="song-name">Nangs</span>
            <div class="controls">
                <button id="play-pause" class="control-btn">Pause</button>
                
                <span style="font-size: 12px;">🔊</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const btn = document.getElementById('start-btn');
        const player = document.getElementById('player-container');
        const volumeSlider = document.getElementById('volume-slider');
        const playPauseBtn = document.getElementById('play-pause');

        audio.volume = 0.5;

        // Start Interaction
        btn.addEventListener('click', function() {
            btn.style.display = 'none';
            video.style.display = 'block';
            
            // Trigger Fade In
            player.classList.add('show-player');
            
            video.play();
            audio.play();
        });

        // Play/Pause Toggle
        playPauseBtn.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = 'Pause';
            } else {
                audio.pause();
                playPauseBtn.textContent = 'Play';
            }
        });

        // Volume control
        volumeSlider.addEventListener('input', function() {
            audio.volume = this.value;
        });

        // Freeze video on last frame
        video.loop = false;
        video.onended = function() {
            video.pause();
        };
    </script>

</body>
</html>
