<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter</title>
    <link rel="icon" type="image/png" href="ballicon.png">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #intro-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        #start-container {
            position: relative; z-index: 25; cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-container:hover { transform: scale(1.1); }
        
        #click2cry-btn {
            width: 500px; max-width: 90vw; height: auto; display: block;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        /* Pop effect on click */
        .pop-animation { animation: pop-out 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes pop-out { 
            0% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.2); opacity: 1; } 
            100% { transform: scale(0); opacity: 0; } 
        }

        #theme-picker { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 100; }
        .theme-box {
            width: 45px; height: 45px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; overflow: hidden; transition: transform 0.3s;
        }
        .theme-box:hover { transform: scale(1.2); border-color: white; }
        .theme-box video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    </style>
</head>
<body>

    <video id="intro-video" autoplay muted loop>
        <source src="pinkstar.mp4" type="video/mp4">
    </video>

    <div id="start-container">
        <img src="click2cry.png" id="click2cry-btn">
    </div>

    <div id="theme-picker">
        <div class="theme-box" onclick="changeTheme('pinkstar.mp4')"><video muted loop><source src="pinkstar.mp4"></video></div>
        <div class="theme-box" onclick="changeTheme('cyanstar.mp4')"><video muted loop><source src="cyanstar.mp4"></video></div>
        <div class="theme-box" onclick="changeTheme('purplestar.mp4')"><video muted loop><source src="purplestar.mp4"></video></div>
        <div class="theme-box" onclick="changeTheme('bluestar.mp4')"><video muted loop><source src="bluestar.mp4"></video></div>
    </div>

    <script>
        function changeTheme(src) {
            const v = document.getElementById('intro-video');
            v.src = src;
            v.play();
        }

        document.getElementById('start-container').addEventListener('click', function() {
            this.classList.add('pop-animation');
            // Store that we just clicked enter so the main page knows to play the intro
            sessionStorage.setItem('justEntered', 'true');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 600);
        });
    </script>
</body>
</html>
