<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* 1. Remove all scrollbars and margins */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black; /* Fallback while video loads */
        }

        /* 2. Make video fill the entire screen */
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
    </style>
</head>
<body>

    <video id="background-video" autoplay muted playsinline>
        <source src="currents.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const video = document.getElementById('background-video');

        // Ensure the video does not loop
        video.loop = false;

        // Force the video to stay on the final frame
        video.onended = function() {
            video.pause();
        };
    </script>

</body>
</html>
