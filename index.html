<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* 1. Page Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. Video Styling */
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 1;
        }

        /* 3. Start Button */
        #start-btn {
            cursor: pointer;
            z-index: 10;
            max-width: 200px;
            transition: transform 0.2s ease;
        }

        /* 4. Music Player UI (Bottom Right) */
        #player-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none; /* Hidden until start */
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            z-index: 5;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #album-art {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            margin-right: 12px;
            object-fit: cover;
        }

        .song-info {
            margin-right: 20px;
        }

        .song-name {
            font-weight: bold;
            font-size: 14px;
            display: block;
        }

        /* Volume Slider Styling */
        input[type=range] {
            cursor: pointer;
            width: 80px;
        }
    </style>
</head>
<body>

    <img src="start.png" id="start-btn" alt="Start">

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music">
        <source src="nangs.mp3" type="audio/mpeg">
    </audio>

    <div id="player-container">
        <img src="currentscover.jpg" id="album-art" alt="Album Cover">
        <div class="song-info">
            <span class="song-name">Nangs</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <script>
        const video = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const btn = document.getElementById('start-btn');
        const player = document.getElementById('player-container');
        const volumeSlider = document.getElementById('volume-slider');

        // Initial Volume set to 50%
        audio.volume = 0.5;

        btn.addEventListener('click', function() {
            btn.style.display = 'none';
            video.style.display = 'block';
            player.style.display = 'flex'; // Show music UI
            
            video.play();
            audio.play();
        });

        // Handle Volume Slider
        volumeSlider.addEventListener('input', function() {
            audio.volume = this.value;
        });

        // Freeze video on last frame
        video.loop = false;
        video.onended = function() {
            video.pause();
        };
    </script>

</body>
</html>
