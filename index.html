<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* 1. Page Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 2. Background Video */
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 1;
        }

        /* 3. Start Button with Pop Effect */
        #start-btn {
            cursor: pointer;
            z-index: 20;
            max-width: 150px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-btn:hover { transform: scale(1.18); }

        /* 4. Name Overlay (Top-Left area) */
        #name-overlay {
            position: fixed;
            top: 35%; 
            left: 8%;
            max-width: 300px;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        /* 5. Minimalist Player UI */
        #player-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 15;
            color: white;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .show-ui { opacity: 1 !important; pointer-events: auto !important; }

        #album-art {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            margin-bottom: 12px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #album-art:hover { transform: scale(1.05); }

        .song-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .volume-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        #volume-slider {
            width: 80px;
            height: 4px;
            cursor: pointer;
            accent-color: #fff;
        }

        .control-btns {
            display: flex;
            gap: 20px;
        }

        .phys-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .phys-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        /* 6. Big Screen (Lightbox) Styling */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #lightbox img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .show-lightbox { display: flex !important; opacity: 1 !important; }

    </style>
</head>
<body>

    <img src="start.png" id="start-btn" alt="Start">

    <img src="currentsname.png" id="name-overlay" alt="Name">

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music">
        <source src="nangs.mp3" type="audio/mpeg">
    </audio>

    <div id="player-container">
        <img src="currentscover.jpg" id="album-art" alt="Album Cover">
        <span class="song-name">Nangs</span>
        
        <div class="volume-box">
            <span style="font-size: 12px;">🔊</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="control-btns">
            <button id="play-btn" class="phys-btn">▶</button>
            <button id="pause-btn" class="phys-btn">❚❚</button>
        </div>
    </div>

    <div id="lightbox">
        <img src="currentscover.jpg" alt="Album Cover Large">
    </div>

    <script>
        const video = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const startBtn = document.getElementById('start-btn');
        const nameImg = document.getElementById('name-overlay');
        const player = document.getElementById('player-container');
        const volumeSlider = document.getElementById('volume-slider');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const albumArt = document.getElementById('album-art');
        const lightbox = document.getElementById('lightbox');

        audio.volume = 0.5;

        // Start function
        startBtn.addEventListener('click', function() {
            startBtn.style.display = 'none';
            video.style.display = 'block';
            player.classList.add('show-ui');
            
            video.play();
            audio.play();

            video.addEventListener('timeupdate', function() {
                if (video.currentTime > (video.duration / 2)) {
                    nameImg.classList.add('show-ui');
                }
            });
        });

        // Open Big Screen
        albumArt.addEventListener('click', () => {
            lightbox.classList.add('show-lightbox');
        });

        // Close Big Screen
        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('show-lightbox');
        });

        // Controls
        playBtn.addEventListener('click', () => audio.play());
        pauseBtn.addEventListener('click', () => audio.pause());

        volumeSlider.addEventListener('input', function() {
            audio.volume = this.value;
        });

        video.loop = false;
        video.onended = function() {
            video.pause();
        };
    </script>

</body>
</html>
