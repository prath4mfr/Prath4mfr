<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* 1. Page Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 2. Background Video */
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 1;
        }

        /* 3. Start Button */
        #start-btn {
            cursor: pointer;
            z-index: 20;
            max-width: 110px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-btn:hover { transform: scale(1.15); }

        /* 4. Name Overlay (Extreme Top-Right for PC) */
        #name-overlay {
            position: fixed;
            top: 20px;       /* Small gap from top */
            right: 20px;     /* Small gap from right */
            width: 800px; 
            max-width: 90vw;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        /* 5. Micro Player UI (Bottom-Right) */
        #player-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 15px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 15;
            color: white;
            opacity: 0;
            transition: opacity 1.5s ease;
            display: none;
        }

        .show-ui { opacity: 1 !important; display: flex !important; }

        #album-art {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            margin-bottom: 6px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .song-name {
            font-size: 9px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
            text-align: center;
            width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #volume-slider {
            width: 70px;
            height: 2px;
            cursor: pointer;
            accent-color: #fff;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .phys-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .side-btn { width: 24px; height: 24px; font-size: 9px; }
        .main-btn { width: 34px; height: 34px; font-size: 12px; background: rgba(255, 255, 255, 0.1); }

        /* 6. MOBILE/TABLET SPECIFIC STYLES */
        @media only screen and (max-width: 768px) {
            #name-overlay {
                width: 320px;
                top: 5%;
                right: 50%;
                transform: translateX(50%); /* Centers the element horizontally */
                text-align: center;
            }
            #player-container {
                bottom: 15px;
                right: 15px;
                padding: 10px;
            }
        }

        /* 7. Lightbox */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 100; cursor: zoom-out; opacity: 0; transition: opacity 0.5s ease;
        }
        #lightbox img { max-width: 75%; max-height: 75%; border-radius: 6px; }
        .show-lightbox { display: flex !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <img src="start.png" id="start-btn" alt="Start">
    <img src="currentsname.png" id="name-overlay" alt="Name">

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music"></audio>

    <div id="player-container">
        <img src="currentscover.jpg" id="album-art" alt="Album Cover">
        <span id="display-song-name" class="song-name">Nangs</span>
        
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">

        <div class="control-row">
            <button id="prev-btn" class="phys-btn side-btn">«</button>
            <button id="toggle-btn" class="phys-btn main-btn">❚❚</button>
            <button id="next-btn" class="phys-btn side-btn">»</button>
        </div>
    </div>

    <div id="lightbox">
        <img src="currentscover.jpg" alt="Album Cover Large">
    </div>

    <script>
        const playlist = [
            { name: "Let It Happen", file: "letithappen.mp3" },
            { name: "Nangs", file: "nangs.mp3" },
            { name: "The Moment", file: "themoment.mp3" },
            { name: "Yes I'm Changing", file: "yesimchanging.mp3" },
            { name: "Eventually", file: "eventually.mp3" },
            { name: "Gossip", file: "gossip.mp3" },
            { name: "The Less I Know The Better", file: "thelessiknowthebetter.mp3" },
            { name: "Past Life", file: "pastlife.mp3" },
            { name: "Disciples", file: "disciples.mp3" },
            { name: "'Cause I'm A Man", file: "causeimaman.mp3" },
            { name: "Reality In Motion", file: "realityinmotion.mp3" },
            { name: "Love/Paranoia", file: "loveparanoia.mp3" },
            { name: "New Person, Same Old Mistakes", file: "newpersonsameoldmistakes.mp3" }
        ];

        let currentTrackIndex = 1;

        const video = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const startBtn = document.getElementById('start-btn');
        const nameImg = document.getElementById('name-overlay');
        const player = document.getElementById('player-container');
        const volumeSlider = document.getElementById('volume-slider');
        const toggleBtn = document.getElementById('toggle-btn');
        const albumArt = document.getElementById('album-art');
        const lightbox = document.getElementById('lightbox');
        const songLabel = document.getElementById('display-song-name');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');

        function loadTrack(index) {
            currentTrackIndex = index;
            audio.src = playlist[index].file;
            songLabel.innerText = playlist[index].name;
            audio.play();
            toggleBtn.innerHTML = '❚❚';
        }

        startBtn.addEventListener('click', function() {
            startBtn.style.display = 'none';
            video.style.display = 'block';
            player.classList.add('show-ui');
            video.play();
            loadTrack(1);

            video.addEventListener('timeupdate', function() {
                if (video.currentTime > (video.duration / 2)) {
                    nameImg.style.opacity = "1";
                }
            });
        });

        toggleBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); toggleBtn.innerHTML = '❚❚'; }
            else { audio.pause(); toggleBtn.innerHTML = '▶'; }
        });

        nextBtn.addEventListener('click', () => {
            let nextIndex = (currentTrackIndex + 1) % playlist.length;
            loadTrack(nextIndex);
        });

        prevBtn.addEventListener('click', () => {
            let prevIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(prevIndex);
        });

        albumArt.addEventListener('click', () => lightbox.classList.add('show-lightbox'));
        lightbox.addEventListener('click', () => lightbox.classList.remove('show-lightbox'));
        volumeSlider.addEventListener('input', function() { audio.volume = this.value; });
        
        video.loop = false;
        video.onended = () => video.pause();

        audio.onended = () => {
            let nextIndex = (currentTrackIndex + 1) % playlist.length;
            loadTrack(nextIndex);
        };
    </script>
</body>
</html>
