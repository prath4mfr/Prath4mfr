<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="icon" type="image/jpeg" href="ballicon.png">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #background-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 1;
        }

        /* GIF and Bubble Button Container */
        #start-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-container:hover { transform: scale(1.1); }

        #start-gif {
            max-width: 150px;
            height: auto;
        }

        #bubble-btn {
            background: #ff85a2; /* Pinkish */
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
            animation: float 3s ease-in-out infinite;
            text-transform: uppercase;
            border: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* UI Overlays */
        #name-overlay {
            position: fixed; top: 10px; right: 10px;
            width: 450px; max-width: 70vw;
            z-index: 10; opacity: 0; pointer-events: none;
            padding: 15px; border-radius: 40px; border: 1px solid transparent;
            transition: opacity 2s ease, border 2.5s ease, background 2.5s ease, backdrop-filter 2.5s ease;
        }

        #nav-sidebar {
            position: fixed; left: 40px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; 
            align-items: center; gap: 40px; 
            z-index: 15; opacity: 0;
            padding: 50px; border-radius: 60px; border: 1px solid transparent;
            transition: opacity 2s ease, border 2.5s ease, background 2.5s ease, backdrop-filter 2.5s ease;
        }

        .nav-icon {
            width: 160px; height: auto; cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease; display: block;
        }
        .nav-icon:hover { transform: scale(1.08); filter: brightness(1.2); }

        .final-border {
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        #skip-btn {
            position: fixed; bottom: 25px; left: 25px; z-index: 30;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 8px 15px; border-radius: 30px; font-size: 10px;
            letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(10px);
            opacity: 0; display: none; transition: opacity 1.5s ease;
        }

        #player-container {
            position: fixed; bottom: 20px; right: 20px;
            display: none; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 15px; border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08); z-index: 15; color: white;
            opacity: 0; transition: opacity 1.5s ease;
        }
        .show-ui { opacity: 1 !important; display: flex !important; }

        .phys-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; }

        @media only screen and (max-width: 768px) {
            #name-overlay { width: 320px; top: 40px; right: 50%; transform: translateX(50%); }
            #nav-sidebar { left: 50%; top: 45%; transform: translate(-50%, -50%); padding: 40px; gap: 50px; border-radius: 50px; width: 80%; }
            .nav-icon { width: 180px; } 
            #player-container { right: 20px; bottom: 20px; transform: none; }
            #skip-btn { left: 20px; bottom: 20px; transform: none; }
        }
    </style>
</head>
<body>

    <div id="start-container">
        <img src="start.gif" id="start-gif">
        <button id="bubble-btn">CLICK</button>
    </div>

    <button id="skip-btn">SKIP INTRO</button>
    <img src="currentsname.png" id="name-overlay">

    <div id="nav-sidebar">
        <a href="social.html"><img src="social.png" class="nav-icon"></a>
        <a href="art.html"><img src="art.png" class="nav-icon"></a>
        <a href="music.html"><img src="music.png" class="nav-icon"></a>
    </div>

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music"></audio>

    <div id="player-container">
        <img src="currentscover.jpg" style="width: 45px; height: 45px; border-radius: 6px; margin-bottom: 6px;">
        <span id="display-song-name" style="font-size: 8px; text-transform: uppercase; opacity: 0.6; margin-bottom: 10px;">Nangs</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" style="width: 60px; accent-color: #fff; margin-bottom: 12px; opacity: 0.4;">
        <div style="display: flex; gap: 8px;">
            <button id="prev-btn" class="phys-btn" style="width: 22px; height: 22px; font-size: 8px;">«</button>
            <button id="toggle-btn" class="phys-btn" style="width: 32px; height: 32px; font-size: 11px;">❚❚</button>
            <button id="next-btn" class="phys-btn" style="width: 22px; height: 22px; font-size: 8px;">»</button>
        </div>
    </div>

    <script>
        const playlist = [
            { name: "Let It Happen", file: "letithappen.mp3" },
            { name: "Nangs", file: "nangs.mp3" },
            { name: "The Moment", file: "themoment.mp3" }
            // ... Add others as needed
        ];

        let currentTrackIndex = 1;
        let glassLocked = false; 
        
        const video = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const startContainer = document.getElementById('start-container');
        const skipBtn = document.getElementById('skip-btn');
        const nameImg = document.getElementById('name-overlay');
        const navSidebar = document.getElementById('nav-sidebar');
        const player = document.getElementById('player-container');
        const toggleBtn = document.getElementById('toggle-btn');

        function loadTrack(index) {
            currentTrackIndex = index;
            audio.src = playlist[index].file;
            document.getElementById('display-song-name').innerText = playlist[index].name;
            audio.play();
            toggleBtn.innerHTML = '❚❚';
        }

        // Turbo Loop logic
        video.onended = () => {
            video.currentTime = 3;
            video.play();
        };

        startContainer.addEventListener('click', () => {
            startContainer.style.display = 'none';
            video.style.display = 'block';
            player.classList.add('show-ui');
            skipBtn.style.display = 'block';
            setTimeout(() => { skipBtn.style.opacity = "1"; }, 10);

            video.currentTime = 3;
            video.play();
            loadTrack(1);

            video.addEventListener('timeupdate', () => {
                // Turbo Boost: fast for first 2 seconds after the 3s mark
                if (video.currentTime > 3 && video.currentTime < 5) {
                    video.playbackRate = 3.0;
                } else {
                    video.playbackRate = 1.0;
                }

                if (video.currentTime > (video.duration / 2)) {
                    nameImg.style.opacity = "1";
                    navSidebar.style.opacity = "1";
                    skipBtn.style.opacity = "0";
                    setTimeout(() => { skipBtn.style.display = "none"; }, 1500);
                }
                
                if (video.currentTime > (video.duration - 6)) {
                    if (!glassLocked) {
                        nameImg.classList.add('final-border');
                        navSidebar.classList.add('final-border');
                        glassLocked = true; 
                    }
                }
            });
        });

        skipBtn.addEventListener('click', () => {
            video.currentTime = (video.duration / 2) + 0.1;
        });

        toggleBtn.addEventListener('click', () => {
            audio.paused ? audio.play() : audio.pause();
            toggleBtn.innerHTML = audio.paused ? '▶' : '❚❚';
        });

        document.getElementById('next-btn').addEventListener('click', () => loadTrack((currentTrackIndex + 1) % playlist.length));
        document.getElementById('prev-btn').addEventListener('click', () => loadTrack((currentTrackIndex - 1 + playlist.length) % playlist.length));
        document.getElementById('volume-slider').addEventListener('input', (e) => audio.volume = e.target.value);
    </script>
</body>
</html>
