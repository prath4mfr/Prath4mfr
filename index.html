<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="icon" type="image/png" href="ballicon.png">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #background-video, #intro-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }
        #background-video { display: none; }

        .top-left-controls {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 8px; border-radius: 8px; cursor: pointer;
            backdrop-filter: blur(10px); font-size: 14px; opacity: 0.6; transition: opacity 0.3s, transform 0.2s;
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { opacity: 1; transform: scale(1.05); }

        #start-container {
            position: relative; z-index: 25; cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-container:hover { transform: scale(1.1); }
        
        #click2cry-btn {
            width: 500px; max-width: 90vw; height: auto; display: block;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        .pop-animation { animation: pop-out 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes pop-out { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        #theme-picker { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 100; }
        .theme-box {
            width: 45px; height: 45px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; overflow: hidden; transition: transform 0.3s;
        }
        .theme-box:hover { transform: scale(1.2); border-color: white; }
        .theme-box video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        #name-overlay {
            position: fixed; top: 20px; right: 20px; width: 480px; max-width: 85vw;
            z-index: 15; opacity: 0; display: none; padding: 20px; border-radius: 40px; border: 1px solid transparent;
            transition: opacity 2s ease, border 2.5s ease, background 2.5s ease, backdrop-filter 2.5s ease;
        }

        #nav-sidebar {
            position: fixed; left: 30px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; align-items: center; gap: 50px; 
            z-index: 15; opacity: 0; padding: 60px 40px; border-radius: 60px; border: 1px solid transparent;
            transition: opacity 2s ease, border 2.5s ease, background 2.5s ease, backdrop-filter 2.5s ease;
        }

        .nav-icon { width: 180px; height: auto; cursor: pointer; transition: transform 0.3s ease; }
        .final-border { border: 1px solid rgba(255, 255, 255, 0.2) !important; background: rgba(255, 255, 255, 0.08) !important; backdrop-filter: blur(15px); }

        #skip-btn {
            position: fixed; bottom: 25px; left: 25px; z-index: 30;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 8px 15px; border-radius: 30px; font-size: 10px;
            letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(10px);
            opacity: 0; display: none; transition: opacity 1.5s ease;
        }

        #music-controls-wrapper {
            position: fixed; bottom: 20px; right: 20px;
            display: none; align-items: stretch; gap: 10px; z-index: 15;
            opacity: 0; transition: opacity 1.5s ease;
        }
        .show-ui { opacity: 1 !important; display: flex !important; }

        #player-container {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px);
            padding: 15px; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08); color: white;
        }

        #volume-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px);
            padding: 15px 10px; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08); width: 30px;
        }

        #volume-slider { appearance: slider-vertical; -webkit-appearance: slider-vertical; width: 4px; height: 80px; accent-color: #fff; opacity: 0.4; }
        #music-progress { width: 100px; height: 2px; accent-color: #fff; margin-bottom: 8px; cursor: pointer; }
        .song-name { font-size: 8px; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; opacity: 0.6; text-align: center; width: 100px; }
        .time-container { display: flex; justify-content: space-between; width: 100px; font-size: 7px; opacity: 0.5; }
        .phys-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .side-btn { width: 22px; height: 22px; font-size: 8px; }
        .main-btn { width: 32px; height: 32px; font-size: 11px; }

        @media only screen and (max-width: 768px) {
            #name-overlay { width: 320px; top: 40px; right: 50%; transform: translateX(50%); }
            #nav-sidebar { left: 50%; top: 45%; transform: translate(-50%, -50%); width: 80%; }
        }
    </style>
</head>
<body>

    <div class="top-left-controls">
        <button id="fs-toggle" class="icon-btn">⛶</button>
        <button id="back-btn" class="icon-btn">⇠</button>
    </div>

    <button id="skip-btn">SKIP INTRO</button>

    <video id="intro-video" autoplay muted loop>
        <source src="pinkstar.mp4" type="video/mp4">
    </video>

    <div id="start-container">
        <img src="click2cry.png" id="click2cry-btn">
    </div>

    <div id="theme-picker">
        <div class="theme-box" onclick="changeTheme('pinkstar.mp4')"><video muted loop><source src="pinkstar.mp4"></video></div>
        <div class="theme-box" onclick="changeTheme('cyanstar.mp4')"><video muted loop><source src="cyanstar.mp4"></video></div>
        <div class="theme-box" onclick="changeTheme('purplestar.mp4')"><video muted loop><source src="purplestar.mp4"></video></div>
        <div class="theme-box" onclick="changeTheme('bluestar.mp4')"><video muted loop><source src="bluestar.mp4"></video></div>
    </div>

    <img src="currentsname.png" id="name-overlay">

    <div id="nav-sidebar">
        <a href="social.html"><img src="social.png" class="nav-icon"></a>
        <a href="art.html"><img src="art.png" class="nav-icon"></a>
        <a href="music.html"><img src="music.png" class="nav-icon"></a>
    </div>

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music" preload="auto"></audio>

    <div id="music-controls-wrapper">
        <div id="player-container">
            <img src="currentscover.jpg" id="album-art" style="width:45px; border-radius:6px; cursor:pointer;">
            <div class="time-container"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>
            <input type="range" id="music-progress" min="0" max="100" value="0">
            <span id="display-song-name" class="song-name">Nangs</span>
            <div class="control-row" style="display:flex; gap:8px;">
                <button id="prev-btn" class="phys-btn side-btn">«</button>
                <button id="toggle-btn" class="phys-btn main-btn">❚❚</button>
                <button id="next-btn" class="phys-btn side-btn">»</button>
            </div>
        </div>
        <div id="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span style="font-size:10px; margin-top:8px; opacity:0.5;">🔊</span>
        </div>
    </div>

    <script>
        const playlist = [
            { name: "Let It Happen", file: "letithappen.mp3" },
            { name: "Nangs", file: "nangs.mp3" },
            { name: "The Moment", file: "themoment.mp3" },
            { name: "Yes I'm Changing", file: "yesimchanging.mp3" },
            { name: "Eventually", file: "eventually.mp3" },
            { name: "Gossip", file: "gossip.mp3" },
            { name: "The Less I Know The Better", file: "thelessiknowthebetter.mp3" },
            { name: "Past Life", file: "pastlife.mp3" },
            { name: "Disciples", file: "disciples.mp3" },
            { name: "'Cause I'm A Man", file: "causeimaman.mp3" },
            { name: "Reality In Motion", file: "realityinmotion.mp3" },
            { name: "Love/Paranoia", file: "loveparanoia.mp3" },
            { name: "New Person, Same Old Mistakes", file: "newpersonsameoldmistakes.mp3" }
        ];

        let currentTrackIndex = parseInt(localStorage.getItem('trackIndex')) || 1;
        const video = document.getElementById('background-video');
        const introVideo = document.getElementById('intro-video');
        const audio = document.getElementById('bg-music');
        const startContainer = document.getElementById('start-container');
        const nameImg = document.getElementById('name-overlay');
        const navSidebar = document.getElementById('nav-sidebar');
        const musicUI = document.getElementById('music-controls-wrapper');
        const skipBtn = document.getElementById('skip-btn');
        const backBtn = document.getElementById('back-btn');

        function changeTheme(src) { introVideo.src = src; introVideo.play(); }

        function formatTime(secs) {
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function loadTrack(index, startTime = 0) {
            currentTrackIndex = index;
            localStorage.setItem('trackIndex', index);
            audio.src = playlist[index].file;
            document.getElementById('display-song-name').innerText = playlist[index].name;
            audio.currentTime = startTime;
            if (localStorage.getItem('isPaused') === 'true') { audio.pause(); document.getElementById('toggle-btn').innerHTML = '▶'; }
            else { audio.play(); document.getElementById('toggle-btn').innerHTML = '❚❚'; }
        }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                document.getElementById('music-progress').value = (audio.currentTime / audio.duration) * 100;
                document.getElementById('time-current').innerText = formatTime(audio.currentTime);
                document.getElementById('time-total').innerText = formatTime(audio.duration);
                localStorage.setItem('musicTime', audio.currentTime);
            }
        };

        // REFRESH LOGIC: On a fresh window open/refresh, always show "Enter"
        // Session storage clears when tab is closed, making it perfect for "new open"
        if (performance.navigation.type === 1 || !sessionStorage.getItem('enteredThisSession')) {
            showEnterScreen();
        } else {
            enterMainSite(true);
        }

        function showEnterScreen() {
            startContainer.style.display = 'flex';
            startContainer.classList.remove('pop-animation');
            introVideo.style.display = 'block';
            document.getElementById('theme-picker').style.display = 'flex';
            video.style.display = 'none';
            musicUI.classList.remove('show-ui');
            nameImg.style.display = 'none';
            navSidebar.style.display = 'none';
            nameImg.style.opacity = "0";
            navSidebar.style.opacity = "0";
            nameImg.classList.remove('final-border');
            navSidebar.classList.remove('final-border');
        }

        function enterMainSite(immediate = false) {
            sessionStorage.setItem('enteredThisSession', 'true');
            startContainer.style.display = 'none';
            introVideo.style.display = 'none';
            document.getElementById('theme-picker').style.display = 'none';
            video.style.display = 'block';
            musicUI.classList.add('show-ui');

            if (immediate) {
                video.currentTime = 10;
                video.play();
                nameImg.style.display = 'block';
                navSidebar.style.display = 'flex';
                nameImg.style.opacity = "1";
                navSidebar.style.opacity = "1";
                nameImg.classList.add('final-border');
                navSidebar.classList.add('final-border');
                loadTrack(currentTrackIndex, parseFloat(localStorage.getItem('musicTime')) || 0);
            } else {
                video.currentTime = 3;
                video.play();
                skipBtn.style.display = 'block';
                setTimeout(() => { skipBtn.style.opacity = "1"; }, 10);
                loadTrack(currentTrackIndex);
            }
        }

        startContainer.addEventListener('click', () => {
            startContainer.classList.add('pop-animation');
            setTimeout(() => enterMainSite(false), 600);
        });

        backBtn.onclick = () => {
            sessionStorage.removeItem('enteredThisSession');
            location.reload(); // Restarts the progress as requested
        };

        video.addEventListener('timeupdate', () => {
            if (video.currentTime > 3 && video.currentTime < 5) video.playbackRate = 3.0;
            else video.playbackRate = 1.0;
            if (video.currentTime > (video.duration / 2)) {
                nameImg.style.display = 'block'; navSidebar.style.display = 'flex';
                setTimeout(() => { nameImg.style.opacity = "1"; navSidebar.style.opacity = "1"; }, 50);
                skipBtn.style.opacity = "0"; setTimeout(() => skipBtn.style.display = "none", 1500);
            }
            if (video.currentTime > (video.duration - 6)) {
                nameImg.classList.add('final-border'); navSidebar.classList.add('final-border');
            }
        });

        skipBtn.onclick = () => { video.currentTime = (video.duration / 2) + 0.1; };
        document.getElementById('toggle-btn').onclick = () => {
            if (audio.paused) { audio.play(); document.getElementById('toggle-btn').innerHTML = '❚❚'; localStorage.setItem('isPaused', 'false'); }
            else { audio.pause(); document.getElementById('toggle-btn').innerHTML = '▶'; localStorage.setItem('isPaused', 'true'); }
        };
        document.getElementById('next-btn').onclick = () => loadTrack((currentTrackIndex + 1) % playlist.length);
        document.getElementById('prev-btn').onclick = () => loadTrack((currentTrackIndex - 1 + playlist.length) % playlist.length);
        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
        document.getElementById('music-progress').oninput = () => audio.currentTime = (document.getElementById('music-progress').value / 100) * audio.duration;
        document.getElementById('fs-toggle').onclick = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
    </script>
</body>
</html>
