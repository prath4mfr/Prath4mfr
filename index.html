<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* 1. Page Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 2. Background Video */
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 1;
        }

        /* 3. Start Button */
        #start-btn {
            cursor: pointer;
            z-index: 20;
            max-width: 150px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-btn:hover { transform: scale(1.18); }

        /* 4. Name Overlay (Pushed more to Edge/Top) */
        #name-overlay {
            position: fixed;
            top: 15%; /* Higher up */
            left: 4%; /* Closer to the left edge */
            width: 450px;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        /* 5. Minimalist Player UI (Very Transparent) */
        #player-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05); /* Ultra Transparent */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 20px 25px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 15;
            color: white;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .show-ui { opacity: 1 !important; pointer-events: auto !important; }

        #album-art {
            width: 85px;
            height: 85px;
            border-radius: 12px;
            margin-bottom: 12px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        #album-art:hover { transform: scale(1.05); }

        .song-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Volume Slider (No Emoji) */
        #volume-slider {
            width: 100px;
            height: 2px;
            cursor: pointer;
            accent-color: #fff;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        /* Controls Row */
        .control-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .phys-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .side-btn { width: 35px; height: 35px; font-size: 12px; }
        .main-btn { width: 50px; height: 50px; font-size: 18px; background: rgba(255, 255, 255, 0.15); }

        .phys-btn:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }

        /* 6. Lightbox */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 100; cursor: zoom-out; opacity: 0; transition: opacity 0.5s ease;
        }
        #lightbox img { max-width: 85%; max-height: 85%; border-radius: 10px; }
        .show-lightbox { display: flex !important; opacity: 1 !important; }

    </style>
</head>
<body>

    <img src="start.png" id="start-btn" alt="Start">

    <img src="currentsname.png" id="name-overlay" alt="Name">

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music">
        <source src="nangs.mp3" type="audio/mpeg">
    </audio>

    <div id="player-container">
        <img src="currentscover.jpg" id="album-art" alt="Album Cover">
        <span class="song-name">Nangs</span>
        
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">

        <div class="control-row">
            <button class="phys-btn side-btn">«</button> <button id="toggle-btn" class="phys-btn main-btn">❚❚</button> <button class="phys-btn side-btn">»</button> </div>
    </div>

    <div id="lightbox">
        <img src="currentscover.jpg" alt="Album Cover Large">
    </div>

    <script>
        const video = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const startBtn = document.getElementById('start-btn');
        const nameImg = document.getElementById('name-overlay');
        const player = document.getElementById('player-container');
        const volumeSlider = document.getElementById('volume-slider');
        const toggleBtn = document.getElementById('toggle-btn');
        const albumArt = document.getElementById('album-art');
        const lightbox = document.getElementById('lightbox');

        audio.volume = 0.5;

        startBtn.addEventListener('click', function() {
            startBtn.style.display = 'none';
            video.style.display = 'block';
            player.classList.add('show-ui');
            video.play();
            audio.play();

            video.addEventListener('timeupdate', function() {
                if (video.currentTime > (video.duration / 2)) {
                    nameImg.classList.add('show-ui');
                }
            });
        });

        // Toggle Play/Pause
        toggleBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                toggleBtn.innerHTML = '❚❚';
            } else {
                audio.pause();
                toggleBtn.innerHTML = '▶';
            }
        });

        albumArt.addEventListener('click', () => lightbox.classList.add('show-lightbox'));
        lightbox.addEventListener('click', () => lightbox.classList.remove('show-lightbox'));

        volumeSlider.addEventListener('input', function() {
            audio.volume = this.value;
        });

        video.loop = false;
        video.onended = function() {
            video.pause();
        };
    </script>

</body>
</html>
