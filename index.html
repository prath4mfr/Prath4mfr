<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="icon" type="image/jpeg" href="ballicon.png">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #background-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 1;
        }

        #start-btn {
            cursor: pointer; z-index: 20; max-width: 110px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-btn:hover { transform: scale(1.15); }

        /* Name Overlay */
        #name-overlay {
            position: fixed;
            top: 10px; right: 10px;
            width: 450px; max-width: 70vw;
            z-index: 10; opacity: 0;
            pointer-events: none;
            padding: 15px;
            border-radius: 40px;
            border: 1px solid transparent;
            transition: opacity 2s ease, border 2.5s ease, background 2.5s ease, backdrop-filter 2.5s ease;
        }

        /* Nav Sidebar */
        #nav-sidebar {
            position: fixed;
            left: 40px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; 
            align-items: center; gap: 40px; 
            z-index: 15; opacity: 0;
            padding: 50px;
            border-radius: 60px;
            border: 1px solid transparent;
            transition: opacity 2s ease, border 2.5s ease, background 2.5s ease, backdrop-filter 2.5s ease;
        }

        .nav-icon {
            width: 160px; 
            height: auto; 
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            display: block;
        }
        .nav-icon:hover { transform: scale(1.08); filter: brightness(1.2); }

        /* Permanent Glass Background */
        .final-border {
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* Player */
        #player-container {
            position: fixed; bottom: 20px; right: 20px;
            display: none; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 15px; border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08); z-index: 15; color: white;
            opacity: 0; transition: opacity 1.5s ease;
        }
        .show-ui { opacity: 1 !important; display: flex !important; }

        #album-art { width: 45px; height: 45px; border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: transform 0.3s ease; }
        #album-art:hover { transform: scale(1.1); }
        
        .song-name { font-size: 8px; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; opacity: 0.6; width: 100px; text-align: center; }
        #volume-slider { width: 60px; height: 2px; accent-color: #fff; margin-bottom: 12px; opacity: 0.4; }
        .control-row { display: flex; align-items: center; gap: 8px; }
        .phys-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; }
        .side-btn { width: 22px; height: 22px; font-size: 8px; }
        .main-btn { width: 32px; height: 32px; font-size: 11px; }

        /* Art Lightbox */
        #art-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 100; display: none; justify-content: center; align-items: center;
            cursor: zoom-out;
        }
        #art-viewer img { max-width: 85%; max-height: 85%; border-radius: 10px; box-shadow: 0 0 50px rgba(255,255,255,0.1); }

        @media only screen and (max-width: 768px) {
            #name-overlay { width: 280px; top: 10px; right: 50%; transform: translateX(50%); }
            #nav-sidebar { left: 15px; padding: 25px; gap: 35px; border-radius: 40px; }
            .nav-icon { width: 120px; } 
        }
    </style>
</head>
<body>

    <img src="start.png" id="start-btn">
    <img src="currentsname.png" id="name-overlay">

    <div id="art-viewer" onclick="this.style.display='none'">
        <img src="currentscover.jpg">
    </div>

    <div id="nav-sidebar">
        <a href="social.html"><img src="social.png" class="nav-icon"></a>
        <a href="art.html"><img src="art.png" class="nav-icon"></a>
        <a href="music.html"><img src="music.png" class="nav-icon"></a>
    </div>

    <video id="background-video" muted playsinline loop>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music"></audio>

    <div id="player-container">
        <img src="currentscover.jpg" id="album-art">
        <span id="display-song-name" class="song-name">Nangs</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        <div class="control-row">
            <button id="prev-btn" class="phys-btn side-btn">«</button>
            <button id="toggle-btn" class="phys-btn main-btn">❚❚</button>
            <button id="next-btn" class="phys-btn side-btn">»</button>
        </div>
    </div>

    <script>
        const playlist = [
            { name: "Let It Happen", file: "letithappen.mp3" },
            { name: "Nangs", file: "nangs.mp3" },
            { name: "The Moment", file: "themoment.mp3" },
            { name: "Yes I'm Changing", file: "yesimchanging.mp3" },
            { name: "Eventually", file: "eventually.mp3" },
            { name: "Gossip", file: "gossip.mp3" },
            { name: "The Less I Know The Better", file: "thelessiknowthebetter.mp3" },
            { name: "Past Life", file: "pastlife.mp3" },
            { name: "Disciples", file: "disciples.mp3" },
            { name: "'Cause I'm A Man", file: "causeimaman.mp3" },
            { name: "Reality In Motion", file: "realityinmotion.mp3" },
            { name: "Love/Paranoia", file: "loveparanoia.mp3" },
            { name: "New Person, Same Old Mistakes", file: "newpersonsameoldmistakes.mp3" }
        ];

        let currentTrackIndex = 1;
        let glassLocked = false; 
        
        const video = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const startBtn = document.getElementById('start-btn');
        const nameImg = document.getElementById('name-overlay');
        const navSidebar = document.getElementById('nav-sidebar');
        const player = document.getElementById('player-container');
        const toggleBtn = document.getElementById('toggle-btn');
        const songLabel = document.getElementById('display-song-name');
        const artViewer = document.getElementById('art-viewer');
        const albumArt = document.getElementById('album-art');

        function loadTrack(index) {
            currentTrackIndex = index;
            audio.src = playlist[index].file;
            songLabel.innerText = playlist[index].name;
            audio.play();
            toggleBtn.innerHTML = '❚❚';
        }

        albumArt.addEventListener('click', () => { artViewer.style.display = 'flex'; });

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            video.style.display = 'block';
            player.classList.add('show-ui');
            video.play();
            loadTrack(1);

            video.addEventListener('timeupdate', () => {
                if (video.currentTime > (video.duration / 2)) {
                    nameImg.style.opacity = "1";
                    navSidebar.style.opacity = "1";
                }
                
                if (video.currentTime > (video.duration - 6)) {
                    if (!glassLocked) {
                        nameImg.classList.add('final-border');
                        navSidebar.classList.add('final-border');
                        glassLocked = true; 
                    }
                }
            });
        });

        toggleBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); toggleBtn.innerHTML = '❚❚'; }
            else { audio.pause(); toggleBtn.innerHTML = '▶'; }
        });

        document.getElementById('next-btn').addEventListener('click', () => loadTrack((currentTrackIndex + 1) % playlist.length));
        document.getElementById('prev-btn').addEventListener('click', () => loadTrack((currentTrackIndex - 1 + playlist.length) % playlist.length));
        document.getElementById('volume-slider').addEventListener('input', (e) => audio.volume = e.target.value);
        audio.onended = () => loadTrack((currentTrackIndex + 1) % playlist.length);
    </script>
</body>
</html>
