<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* 1. Basic Page Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Video Styling */
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Hidden until button is clicked */
            z-index: 1;
        }

        /* 3. Start Button Styling */
        #start-btn {
            cursor: pointer;
            z-index: 2;
            max-width: 200px; /* Adjust size as needed */
            transition: transform 0.2s ease;
        }

        #start-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <img src="start.png" id="start-btn" alt="Start">

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const video = document.getElementById('background-video');
        const btn = document.getElementById('start-btn');

        btn.addEventListener('click', function() {
            // 1. Hide the button
            btn.style.display = 'none';
            
            // 2. Show and play the video
            video.style.display = 'block';
            video.play();
        });

        // Ensure video stays on the last frame
        video.loop = false;
        video.onended = function() {
            video.pause();
        };
    </script>

</body>
</html>
