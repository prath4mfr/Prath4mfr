<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currents Hub</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Main Background Video */
        #background-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 1;
        }

        #start-btn {
            cursor: pointer; z-index: 25; max-width: 110px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-btn:hover { transform: scale(1.15); }

        /* Internal Video Loop - Now ultra-subtle */
        .box-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; 
            opacity: 0; 
            filter: blur(60px) brightness(0.4); /* High blur, low brightness */
            transition: opacity 5s ease-in-out; /* Smooth fade */
            pointer-events: none;
        }

        /* Containers - Deep Frost Glassmorphism */
        #name-overlay-container, #nav-sidebar {
            position: fixed;
            z-index: 10; opacity: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0); 
            background: rgba(255, 255, 255, 0.01); /* Almost zero opacity */
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            transition: opacity 2s ease, border 5s ease, backdrop-filter 5s ease;
        }

        /* PC Name Placement */
        #name-overlay-container {
            top: 15px; right: 15px;
            width: 420px; max-width: 70vw;
            padding: 15px; border-radius: 40px;
        }

        /* PC Nav Placement */
        #nav-sidebar {
            left: 40px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; 
            align-items: center; gap: 45px; 
            padding: 60px 40px; border-radius: 60px;
        }

        #name-img { width: 100%; height: auto; display: block; }

        .nav-icon {
            width: 160px; height: auto; cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            position: relative; z-index: 2;
        }
        .nav-icon:hover { transform: scale(1.08); filter: brightness(1.3); }

        /* The Final Reveal State */
        .final-glass {
            opacity: 1 !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            backdrop-filter: blur(60px) !important; /* Ultra high blur */
            -webkit-backdrop-filter: blur(60px) !important;
        }
        .final-glass .box-video { opacity: 0.3; } /* Very faint video visibility */

        /* Player - Bottom Right */
        #player-container {
            position: fixed; bottom: 20px; right: 20px;
            display: none; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 15px; border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08); z-index: 15; color: white;
            opacity: 0; transition: opacity 1.5s ease;
        }
        .show-ui { opacity: 1 !important; display: flex !important; }

        .song-name { font-size: 8px; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; opacity: 0.6; }
        .phys-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; }

        /* MOBILE FIXES */
        @media only screen and (max-width: 768px) {
            #name-overlay-container { width: 280px; top: 15px; right: 50%; transform: translateX(50%); border-radius: 30px; }
            #nav-sidebar { left: 10px; padding: 30px; gap: 40px; border-radius: 40px; }
            .nav-icon { width: 140px; } /* Large mobile icons */
        }
    </style>
</head>
<body>

    <img src="start.png" id="start-btn">

    <div id="name-overlay-container">
        <video class="box-video" autoplay muted loop playsinline><source src="currents.mp4" type="video/mp4"></video>
        <img src="currentsname.png" id="name-img">
    </div>

    <div id="nav-sidebar">
        <video class="box-video" autoplay muted loop playsinline><source src="currents.mp4" type="video/mp4"></video>
        <a href="social.html"><img src="social.png" class="nav-icon"></a>
        <a href="art.html"><img src="art.png" class="nav-icon"></a>
        <a href="music.html"><img src="music.png" class="nav-icon"></a>
    </div>

    <video id="background-video" muted playsinline><source src="currents.mp4" type="video/mp4"></video>
    <audio id="bg-music"></audio>

    <div id="player-container">
        <img src="currentscover.jpg" style="width:45px; height:45px; border-radius:6px; margin-bottom:6px;">
        <span id="display-song-name" class="song-name">Nangs</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" style="width:60px; accent-color:#fff; margin-bottom:12px;">
        <div style="display:flex; gap:8px;">
            <button id="prev-btn" class="phys-btn" style="width:22px; height:22px;">«</button>
            <button id="toggle-btn" class="phys-btn" style="width:32px; height:32px;">❚❚</button>
            <button id="next-btn" class="phys-btn" style="width:22px; height:22px;">»</button>
        </div>
    </div>

    <script>
        const playlist = [
            { name: "Let It Happen", file: "letithappen.mp3" },
            { name: "Nangs", file: "nangs.mp3" },
            { name: "The Moment", file: "themoment.mp3" },
            { name: "Yes I'm Changing", file: "yesimchanging.mp3" },
            { name: "Eventually", file: "eventually.mp3" },
            { name: "Gossip", file: "gossip.mp3" },
            { name: "The Less I Know The Better", file: "thelessiknowthebetter.mp3" },
            { name: "Past Life", file: "pastlife.mp3" },
            { name: "Disciples", file: "disciples.mp3" },
            { name: "'Cause I'm A Man", file: "causeimaman.mp3" },
            { name: "Reality In Motion", file: "realityinmotion.mp3" },
            { name: "Love/Paranoia", file: "loveparanoia.mp3" },
            { name: "New Person, Same Old Mistakes", file: "newpersonsameoldmistakes.mp3" }
        ];

        let currentTrackIndex = 1;
        const mainVid = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const startBtn = document.getElementById('start-btn');
        const nameContainer = document.getElementById('name-overlay-container');
        const navSidebar = document.getElementById('nav-sidebar');
        const player = document.getElementById('player-container');
        const toggleBtn = document.getElementById('toggle-btn');
        const songLabel = document.getElementById('display-song-name');

        function loadTrack(index) {
            currentTrackIndex = index;
            audio.src = playlist[index].file;
            songLabel.innerText = playlist[index].name;
            audio.play();
            toggleBtn.innerHTML = '❚❚';
        }

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            mainVid.style.display = 'block';
            player.classList.add('show-ui');
            mainVid.play();
            loadTrack(1);

            mainVid.addEventListener('timeupdate', () => {
                // Initial fade in of the elements themselves
                if (mainVid.currentTime > (mainVid.duration / 2)) {
                    nameContainer.style.opacity = "1";
                    navSidebar.style.opacity = "1";
                }
                // The 5-second slow fade of the Deep Frost effect
                if (mainVid.currentTime > (mainVid.duration - 7)) {
                    nameContainer.classList.add('final-glass');
                    navSidebar.classList.add('final-glass');
                }
            });
        });

        toggleBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); toggleBtn.innerHTML = '❚❚'; }
            else { audio.pause(); toggleBtn.innerHTML = '▶'; }
        });

        document.getElementById('next-btn').addEventListener('click', () => loadTrack((currentTrackIndex + 1) % playlist.length));
        document.getElementById('prev-btn').addEventListener('click', () => loadTrack((currentTrackIndex - 1 + playlist.length) % playlist.length));
        document.getElementById('volume-slider').addEventListener('input', (e) => audio.volume = e.target.value);
        
        mainVid.onended = () => mainVid.pause();
        audio.onended = () => loadTrack((currentTrackIndex + 1) % playlist.length);
    </script>
</body>
</html>
