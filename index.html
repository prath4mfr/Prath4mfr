<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="icon" type="image/png" href="ballicon.png">
    
    <style>
        /* Prevents the "flicker" on refresh */
        .hidden-initially { display: none !important; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #background-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 1;
        }

        #fs-toggle {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 8px; border-radius: 8px; cursor: pointer;
            backdrop-filter: blur(10px); font-size: 14px; opacity: 0.6; transition: opacity 0.3s;
        }

        #start-container {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            z-index: 25; cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-gif { width: 280px; max-width: 80vw; height: auto; }
        #bubble-btn {
            background: #ff85a2; color: white; padding: 5px 15px; border-radius: 30px;
            font-size: 11px; font-weight: 800; letter-spacing: 1px;
            animation: float-btn 3s ease-in-out infinite; text-transform: uppercase; border: none;
        }

        @keyframes float-btn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .floating-bubble { position: fixed; bottom: -100px; opacity: 0; pointer-events: none; z-index: 10; animation: float-up 7s linear forwards; }
        @keyframes float-up { 
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            100% { transform: translateY(-120vh) translateX(var(--drift)) rotate(360deg); opacity: 0; }
        }

        #name-overlay {
            position: fixed; top: 20px; right: 20px; width: 480px; max-width: 85vw;
            z-index: 15; opacity: 0; display: none; padding: 20px; border-radius: 40px; border: 1px solid transparent;
            transition: opacity 2s ease, border 2.5s ease, background 2.5s ease, backdrop-filter 2.5s ease;
        }

        #nav-sidebar {
            position: fixed; left: 30px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; align-items: center; gap: 50px; 
            z-index: 15; opacity: 0; padding: 60px 40px; border-radius: 60px; border: 1px solid transparent;
            transition: opacity 2s ease, border 2.5s ease, background 2.5s ease, backdrop-filter 2.5s ease;
        }

        .nav-icon { width: 180px; height: auto; cursor: pointer; transition: transform 0.3s ease; display: block; }
        .final-border { 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        /* Player Container */
        #player-container {
            position: fixed; bottom: 20px; right: 20px; display: none; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 15px; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08); z-index: 15; color: white;
            opacity: 0; transition: opacity 1.5s ease;
        }
        .show-ui { opacity: 1 !important; display: flex !important; }
        #album-art { width: 45px; height: 45px; border-radius: 6px; margin-bottom: 6px; cursor: pointer; }

        /* Progress & Time */
        .time-container { display: flex; justify-content: space-between; width: 100px; font-size: 7px; opacity: 0.5; margin-bottom: 2px; }
        #music-progress { width: 100px; height: 2px; accent-color: #fff; margin-bottom: 8px; cursor: pointer; }
        .song-name { font-size: 8px; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; opacity: 0.6; width: 100px; text-align: center; }

        /* Vertical Volume Control */
        .volume-box { position: relative; display: flex; flex-direction: column; align-items: center; margin-bottom: 12px; }
        #volume-slider { 
            writing-mode: bt-lr; /* Vertical orientation */
            appearance: slider-vertical;
            width: 4px; height: 40px; accent-color: #fff; opacity: 0.4;
        }
        .vol-icon { font-size: 10px; margin-top: 5px; opacity: 0.5; }

        .control-row { display: flex; align-items: center; gap: 8px; }
        .phys-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; }
        .side-btn { width: 22px; height: 22px; font-size: 8px; }
        .main-btn { width: 32px; height: 32px; font-size: 11px; }

        #art-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        #art-viewer img { max-width: 80%; max-height: 80%; border-radius: 12px; transition: transform 0.3s ease; cursor: zoom-in; }
        .zoom-in { transform: scale(1.5); cursor: zoom-out !important; }

        @media only screen and (max-width: 768px) {
            #name-overlay { width: 320px; top: 40px; right: 50%; transform: translateX(50%); }
            #nav-sidebar { left: 50%; top: 45%; transform: translate(-50%, -50%); padding: 40px; width: 80%; }
        }
    </style>
</head>
<body>

    <button id="fs-toggle">⛶</button>

    <div id="start-container">
        <img src="start.gif" id="start-gif">
        <button id="bubble-btn">ENTER</button>
    </div>

    <img src="currentsname.png" id="name-overlay">

    <div id="art-viewer">
        <img src="currentscover.jpg" id="full-art">
    </div>

    <div id="nav-sidebar">
        <a href="social.html"><img src="social.png" class="nav-icon"></a>
        <a href="art.html"><img src="art.png" class="nav-icon"></a>
        <a href="music.html"><img src="music.png" class="nav-icon"></a>
    </div>

    <video id="background-video" muted playsinline>
        <source src="currents.mp4" type="video/mp4">
    </video>

    <audio id="bg-music" preload="auto"></audio>

    <div id="player-container">
        <img src="currentscover.jpg" id="album-art">
        
        <div class="time-container">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
        </div>
        <input type="range" id="music-progress" min="0" max="100" value="0">
        
        <span id="display-song-name" class="song-name">Nangs</span>
        
        <div class="volume-box">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span class="vol-icon">🔊</span>
        </div>

        <div class="control-row">
            <button id="prev-btn" class="phys-btn side-btn">«</button>
            <button id="toggle-btn" class="phys-btn main-btn">❚❚</button>
            <button id="next-btn" class="phys-btn side-btn">»</button>
        </div>
    </div>

    <script>
        const playlist = [
            { name: "Let It Happen", file: "letithappen.mp3" },
            { name: "Nangs", file: "nangs.mp3" },
            { name: "The Moment", file: "themoment.mp3" },
            { name: "Yes I'm Changing", file: "yesimchanging.mp3" },
            { name: "Eventually", file: "eventually.mp3" },
            { name: "Gossip", file: "gossip.mp3" },
            { name: "The Less I Know The Better", file: "thelessiknowthebetter.mp3" },
            { name: "Past Life", file: "pastlife.mp3" },
            { name: "Disciples", file: "disciples.mp3" },
            { name: "'Cause I'm A Man", file: "causeimaman.mp3" },
            { name: "Reality In Motion", file: "realityinmotion.mp3" },
            { name: "Love/Paranoia", file: "loveparanoia.mp3" },
            { name: "New Person, Same Old Mistakes", file: "newpersonsameoldmistakes.mp3" }
        ];

        let currentTrackIndex = parseInt(localStorage.getItem('trackIndex')) || 1;
        let bubbleInterval;
        
        const video = document.getElementById('background-video');
        const audio = document.getElementById('bg-music');
        const startContainer = document.getElementById('start-container');
        const nameImg = document.getElementById('name-overlay');
        const navSidebar = document.getElementById('nav-sidebar');
        const player = document.getElementById('player-container');
        const toggleBtn = document.getElementById('toggle-btn');
        const musicProgress = document.getElementById('music-progress');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');

        function formatTime(secs) {
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function loadTrack(index, startTime = 0) {
            currentTrackIndex = index;
            localStorage.setItem('trackIndex', index);
            audio.src = playlist[index].file;
            document.getElementById('display-song-name').innerText = playlist[index].name;
            audio.currentTime = startTime;
            
            if (localStorage.getItem('isPaused') === 'true') {
                audio.pause();
                toggleBtn.innerHTML = '▶';
            } else {
                audio.play();
                toggleBtn.innerHTML = '❚❚';
            }
        }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                musicProgress.value = (audio.currentTime / audio.duration) * 100;
                timeCurrent.innerText = formatTime(audio.currentTime);
                timeTotal.innerText = formatTime(audio.duration);
                localStorage.setItem('musicTime', audio.currentTime);
            }
        };

        musicProgress.oninput = () => audio.currentTime = (musicProgress.value / 100) * audio.duration;

        function createBubble() {
            const bubble = document.createElement('img');
            bubble.src = 'bubble.png';
            bubble.classList.add('floating-bubble');
            bubble.style.width = `${Math.random() * 60 + 20}px`;
            bubble.style.left = Math.random() * 100 + "vw";
            bubble.style.setProperty('--drift', (Math.random() * 200 - 100) + "px");
            bubble.style.animationDuration = (Math.random() * 4 + 4) + "s";
            document.body.appendChild(bubble);
            bubble.addEventListener('animationend', () => bubble.remove());
        }

        // Logic for returning from other pages (persisting state)
        if (performance.navigation.type !== 1 && !sessionStorage.getItem('sessionActive')) {
            // This is a fresh entry or external refresh - show full intro
            bubbleInterval = setInterval(createBubble, 300);
            sessionStorage.setItem('sessionActive', 'true');
        } else {
            // Returning from another site page - show UI immediately
            startContainer.style.display = 'none';
            video.style.display = 'block';
            video.currentTime = 10; 
            video.play();
            player.classList.add('show-ui');
            nameImg.style.display = 'block';
            navSidebar.style.display = 'flex';
            nameImg.style.opacity = nameImg.style.opacity = "1";
            navSidebar.style.opacity = "1";
            nameImg.classList.add('final-border');
            navSidebar.classList.add('final-border');
            
            const savedTime = parseFloat(localStorage.getItem('musicTime')) || 0;
            loadTrack(currentTrackIndex, savedTime);
        }

        startContainer.addEventListener('click', () => {
            clearInterval(bubbleInterval);
            document.querySelectorAll('.floating-bubble').forEach(b => b.remove());
            startContainer.style.display = 'none';
            video.style.display = 'block';
            player.classList.add('show-ui');
            video.currentTime = 3;
            video.play();
            loadTrack(currentTrackIndex);

            video.addEventListener('timeupdate', () => {
                if (video.currentTime > 3 && video.currentTime < 5) video.playbackRate = 3.0;
                else video.playbackRate = 1.0;
                if (video.currentTime > (video.duration / 2)) {
                    nameImg.style.display = 'block';
                    navSidebar.style.display = 'flex';
                    setTimeout(() => { nameImg.style.opacity = "1"; navSidebar.style.opacity = "1"; }, 50);
                }
                if (video.currentTime > (video.duration - 6)) {
                    nameImg.classList.add('final-border');
                    navSidebar.classList.add('final-border');
                }
            });
        });

        toggleBtn.addEventListener('click', () => {
            if (audio.paused) { 
                audio.play(); toggleBtn.innerHTML = '❚❚'; 
                localStorage.setItem('isPaused', 'false');
            } else { 
                audio.pause(); toggleBtn.innerHTML = '▶'; 
                localStorage.setItem('isPaused', 'true');
            }
        });

        document.getElementById('next-btn').onclick = () => loadTrack((currentTrackIndex + 1) % playlist.length);
        document.getElementById('prev-btn').onclick = () => loadTrack((currentTrackIndex - 1 + playlist.length) % playlist.length);
        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
        document.getElementById('fs-toggle').onclick = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };
        const artViewer = document.getElementById('art-viewer');
        document.getElementById('album-art').onclick = () => artViewer.style.display = 'flex';
        artViewer.onclick = () => { artViewer.style.display = 'none'; document.getElementById('full-art').classList.remove('zoom-in'); };
        document.getElementById('full-art').onclick = (e) => { e.stopPropagation(); e.target.classList.toggle('zoom-in'); };
    </script>
</body>
</html>
