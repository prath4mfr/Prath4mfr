<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social</title>
    <link rel="icon" type="image/png" href="ballicon.png">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #fff; /* Start white for the fade */
            display: flex; justify-content: center; align-items: center;
        }

        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        }

        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transition: opacity 1.5s ease-in-out;
        }

        #door-video { z-index: 2; }
        #whitespace-video { z-index: 1; opacity: 0; }

        /* Navigation or Social UI can go here later */
        #social-ui {
            position: relative; z-index: 10; opacity: 0;
            transition: opacity 2s ease;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="door-video" autoplay muted playsinline>
            <source src="door.mp4" type="video/mp4">
        </video>
        <video id="whitespace-video" muted playsinline loop>
            <source src="whitespace.mp4" type="video/mp4">
        </video>
    </div>

    <div id="social-ui">
        </div>

    <script>
        const doorVid = document.getElementById('door-video');
        const whiteVid = document.getElementById('whitespace-video');
        const socialUI = document.getElementById('social-ui');

        doorVid.onended = () => {
            // Start the loop video in the background
            whiteVid.play();
            
            // Fade out the door video to reveal white
            doorVid.style.opacity = '0';
            
            // Fade in the whitespace loop from the white screen
            setTimeout(() => {
                whiteVid.style.opacity = '1';
                // Show UI after background is settled
                socialUI.style.opacity = '1';
            }, 100);

            // Clean up the door video element after fade
            setTimeout(() => {
                doorVid.style.display = 'none';
            }, 1600);
        };

        // Fallback: If the video fails to autoplay or end, force transition
        window.addEventListener('load', () => {
            if (doorVid.paused) {
                doorVid.play().catch(() => {
                    // If blocked, just show whitespace
                    doorVid.style.display = 'none';
                    whiteVid.style.opacity = '1';
                    whiteVid.play();
                });
            }
        });
    </script>
</body>
</html>
