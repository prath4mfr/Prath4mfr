<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social</title>
    <link rel="icon" type="image/png" href="ballicon.png">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transition: opacity 1.5s ease-in-out;
        }

        #door-video { z-index: 2; }
        #whitespace-video { z-index: 1; opacity: 0; }

        .top-left-controls {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 8px; border-radius: 8px; cursor: pointer;
            backdrop-filter: blur(10px); font-size: 14px; opacity: 0.6; transition: opacity 0.3s;
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { opacity: 1; }

        #social-content {
            position: relative; z-index: 10; opacity: 0;
            transition: opacity 2s ease;
        }
    </style>
</head>
<body>

    <div class="top-left-controls">
        <button id="fs-toggle" class="icon-btn">⛶</button>
        <button id="back-btn" class="icon-btn" onclick="window.location.href='home.html'">⇠</button>
    </div>

    <div class="video-container">
        <video id="door-video" autoplay muted playsinline>
            <source src="door.mp4" type="video/mp4">
        </video>
        <video id="whitespace-video" muted playsinline loop>
            <source src="whitespace.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="door-sound">
        <source src="doorsound.mp3" type="audio/mpeg">
    </audio>

    <div id="social-content">
        </div>

    <script>
        const doorVid = document.getElementById('door-video');
        const whiteVid = document.getElementById('whitespace-video');
        const doorSound = document.getElementById('door-sound');
        const socialContent = document.getElementById('social-content');
        const fsToggle = document.getElementById('fs-toggle');

        let soundTriggered = false;

        doorVid.ontimeupdate = () => {
            // Calculate 12 seconds before the end
            if (doorVid.duration && (doorVid.duration - doorVid.currentTime <= 12)) {
                if (!soundTriggered) {
                    doorSound.play();
                    soundTriggered = true;
                }
            }
        };

        doorVid.onended = () => {
            whiteVid.play();
            doorVid.style.opacity = '0';
            
            setTimeout(() => {
                whiteVid.style.opacity = '1';
                socialContent.style.opacity = '1';
            }, 100);

            setTimeout(() => {
                doorVid.style.display = 'none';
            }, 1600);
        };

        fsToggle.onclick = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };

        window.addEventListener('load', () => {
            if (doorVid.paused) {
                doorVid.play().catch(() => {
                    doorVid.style.display = 'none';
                    whiteVid.style.opacity = '1';
                    whiteVid.play();
                });
            }
        });
    </script>
</body>
</html>
